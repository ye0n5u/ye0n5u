<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes scan { 0%{transform:translateX(-820px)} 100%{transform:translateX(820px)} }
      @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
      .cursor { animation: blink 1s step-end infinite; }
      .scanline { animation: scan 3s linear infinite; }
      .reel { animation: spin 3s linear infinite; }
      .reel2 { animation: spin 3s linear infinite reverse; }
    </style>
    <clipPath id="clip2"><rect width="800" height="160" rx="4"/></clipPath>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e3ecff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e3ecff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e3ecff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="160" rx="4" fill="#0a0e1a"/>
  <rect x="1" y="1" width="798" height="158" rx="3" fill="none" stroke="#e3ecff" stroke-width="2"/>
  <rect x="5" y="5" width="790" height="150" rx="2" fill="none" stroke="#1e2e50" stroke-width="0.5"/>

