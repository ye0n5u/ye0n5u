    <line x1="419.5" y1="57" x2="421.5" y2="57" stroke="#7a9ee8" stroke-width="1"/>
  </g>
  <path d="M379 68 Q400 72 421 68" fill="none" stroke="#2a4070" stroke-width="0.7"/>
  <rect x="372" y="74" width="5" height="4" rx="0.5" fill="#1e2e50"/>
  <rect x="423" y="74" width="5" height="4" rx="0.5" fill="#1e2e50"/>

  <text x="400" y="108" font-family="'Courier New',monospace" font-size="30" font-weight="700" fill="#e3ecff" text-anchor="middle" letter-spacing="6">LEE YEONSU</text>
