<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <style>
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes scan {
        0% { transform: translateX(-800px); }
        100% { transform: translateX(800px); }
      }
      .cursor { animation: blink 1s step-end infinite; }
      .scanline { animation: scan 3s linear infinite; }
    </style>
    <clipPath id="clip">
      <rect width="800" height="160" rx="4"/>
    </clipPath>
    <!-- scanline gradient -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e3ecff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e3ecff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e3ecff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="160" rx="4" fill="#0a0e1a"/>

  <!-- border -->
  <rect x="1" y="1" width="798" height="158" rx="3" fill="none" stroke="#e3ecff" stroke-width="2"/>
  <!-- inner border subtle -->
  <rect x="5" y="5" width="790" height="150" rx="2" fill="none" stroke="#1e2e50" stroke-width="0.5"/>

  <!-- corner decorations -->
  <!-- TL -->
  <text x="12" y="20" font-family="'Courier New', monospace" font-size="9" fill="#3a5a9a">▸ v2.0</text>
  <!-- TR -->
  <text x="680" y="20" font-family="'Courier New', monospace" font-size="9" fill="#7a9ee8">[ ONLINE ]</text>
  <!-- BL -->
  <text x="12" y="150" font-family="'Courier New', monospace" font-size="9" fill="#3a5a9a">© 2025</text>
  <!-- BR -->
  <text x="764" y="150" font-family="'Courier New', monospace" font-size="9" fill="#3a5a9a">KR</text>

  <!-- dot row top -->
  <text x="400" y="30" font-family="'Courier New', monospace" font-size="9" fill="#1e2e50" text-anchor="middle" letter-spacing="4">· · · · · · · · · · · · · · · · · · · · · · · · · · · · ·</text>

  <!-- main name -->
  <text x="400" y="88" font-family="'Courier New', monospace" font-size="34" font-weight="700" fill="#e3ecff" text-anchor="middle" letter-spacing="8">LEE YEONSU</text>

  <!-- cursor after name -->
  <rect x="625" y="60" width="16" height="30" fill="#e3ecff" class="cursor"/>

  <!-- subtitle -->
  <text x="400" y="114" font-family="'Courier New', monospace" font-size="11" fill="#7a9ee8" text-anchor="middle" letter-spacing="4">// 402 Payment Required · South Korea</text>

  <!-- dot row bottom -->
  <text x="400" y="136" font-family="'Courier New', monospace" font-size="9" fill="#1e2e50" text-anchor="middle" letter-spacing="4">· · · · · · · · · · · · · · · · · · · · · · · · · · · · ·</text>

  <!-- scanline animation -->
  <g clip-path="url(#clip)">
    <rect x="-800" y="0" width="800" height="2" fill="url(#scanGrad)" class="scanline"/>
  </g>
</svg>
