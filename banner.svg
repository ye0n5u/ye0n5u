  <text x="400" y="30" font-family="'Courier New',monospace" font-size="9" fill="#1e2e50" text-anchor="middle" letter-spacing="4">· · · · · · · · · · · · · · · · · · · · · · · · · · · · ·</text>

  <rect x="365" y="38" width="70" height="44" rx="2" fill="none" stroke="#e3ecff" stroke-width="1.2"/>
  <line x1="365" y1="44" x2="371" y2="38" stroke="#e3ecff" stroke-width="1.2"/>
  <line x1="429" y1="38" x2="435" y2="44" stroke="#e3ecff" stroke-width="1.2"/>
  <rect x="372" y="46" width="56" height="22" rx="1.5" fill="#0a0e1a" stroke="#4a6aaa" stroke-width="0.8"/>
  <circle cx="385" cy="57" r="6.5" fill="none" stroke="#4a6aaa" stroke-width="0.8"/>
  <circle cx="385" cy="57" r="2" fill="#4a6aaa"/>
  <g class="reel" style="transform-origin:385px 57px">
    <line x1="385" y1="50.5" x2="385" y2="52.5" stroke="#7a9ee8" stroke-width="1"/>
    <line x1="385" y1="61.5" x2="385" y2="63.5" stroke="#7a9ee8" stroke-width="1"/>
    <line x1="378.5" y1="57" x2="380.5" y2="57" stroke="#7a9ee8" stroke-width="1"/>
    <line x1="389.5" y1="57" x2="391.5" y2="57" stroke="#7a9ee8" stroke-width="1"/>
  </g>
  <circle cx="415" cy="57" r="6.5" fill="none" stroke="#4a6aaa" stroke-width="0.8"/>
  <circle cx="415" cy="57" r="2" fill="#4a6aaa"/>
  <g class="reel2" style="transform-origin:415px 57px">
    <line x1="415" y1="50.5" x2="415" y2="52.5" stroke="#7a9ee8" stroke-width="1"/>
    <line x1="415" y1="61.5" x2="415" y2="63.5" stroke="#7a9ee8" stroke-width="1"/>
